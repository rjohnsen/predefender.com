<!doctype html>
<html lang="{{ site.Language.LanguageCode | default "en" }}">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Description | default site.Params.description }}">
  <script>(function(){try{var saved=localStorage.getItem('predefender-theme');var theme=saved||'dark';document.documentElement.dataset.theme=theme;document.documentElement.style.colorScheme=theme;}catch(e){}})();</script>
  <link rel="stylesheet" href="{{ "css/predefender.css" | relURL }}">
</head>
<body class="{{ if .IsHome }}is-home{{ else }}is-content{{ end }}">
{{ if not .IsHome }}{{ partial "site-header.html" . }}<div class="pd-layout">{{ partial "sidebar.html" . }}<main class="pd-content" id="main-content">{{ block "main" . }}{{ end }}</main></div>{{ else }}{{ block "main" . }}{{ end }}{{ end }}
{{ partial "site-footer.html" . }}
{{ if .HasShortcode "mermaid" }}<script src="{{ "js/mermaid.min.js" | relURL }}"></script><script>(function(){var dark=document.documentElement.dataset.theme==='dark';mermaid.initialize({startOnLoad:true,theme:'base',themeVariables:dark?{background:'#07111f',primaryColor:'#14243a',primaryTextColor:'#edf5ff',primaryBorderColor:'#2494ff',secondaryColor:'#101f33',tertiaryColor:'#0b1728',lineColor:'#8297b2',textColor:'#edf5ff',mainBkg:'#14243a',nodeBorder:'#2494ff',clusterBkg:'#0b1728',clusterBorder:'#334a68',edgeLabelBackground:'#07111f',titleColor:'#edf5ff'}:{background:'#ffffff',primaryColor:'#f3f7fc',primaryTextColor:'#07162d',primaryBorderColor:'#087cf0',secondaryColor:'#ffffff',tertiaryColor:'#eef4fa',lineColor:'#64748b',textColor:'#07162d',mainBkg:'#f3f7fc',nodeBorder:'#087cf0',clusterBkg:'#f7faff',clusterBorder:'#b8c8da',edgeLabelBackground:'#ffffff',titleColor:'#07162d'}});})();</script>{{ end }}
<script src="{{ "js/predefender.js" | relURL }}"></script>
</body></html>
